<!DOCTYPE html>
<html>
<head>
    <title>Best GPS Coordinates</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            margin-top: 20px;
            height: 120px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h2>Get Best GPS Location</h2>

    <button onclick="getLocation()">Get Location</button>

    <textarea id="output" readonly></textarea>

    <script>
        let watchId;
        let bestAccuracy = Infinity;
        let bestLat = null;
        let bestLng = null;

        function getLocation() {

            bestAccuracy = Infinity;

            document.getElementById("output").value =
                "Searching for best GPS signal...\nPlease wait 20-30 seconds.";

            if (!navigator.geolocation) {
                document.getElementById("output").value =
                    "Geolocation is not supported by this browser.";
                return;
            }

            watchId = navigator.geolocation.watchPosition(

                function(position) {

                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;

                    if (accuracy < bestAccuracy) {

                        bestAccuracy = accuracy;
                        bestLat = lat;
                        bestLng = lng;

                        document.getElementById("output").value =
                            bestLat + "," + bestLng +
                            "\nAccuracy: " +
                            bestAccuracy.toFixed(2) + " meters";
                    }

                    // Stop automatically when accuracy is very good
                    if (accuracy <= 5) {

                        navigator.geolocation.clearWatch(watchId);

                        document.getElementById("output").value =
                            bestLat + "," + bestLng +
                            "\nAccuracy: " +
                            bestAccuracy.toFixed(2) + " meters" +
                            "\n\nGPS lock achieved.";
                    }
                },

                function(error) {

                    document.getElementById("output").value =
                        "Error: " + error.message;
                },

                {
                    enableHighAccuracy: true,
                    timeout: 30000,
                    maximumAge: 0
                }
            );

            // Stop after 30 seconds and keep the best reading
            setTimeout(() => {

                if (watchId) {
                    navigator.geolocation.clearWatch(watchId);

                    if (bestLat !== null) {

                        document.getElementById("output").value =
                            bestLat + "," + bestLng +
                            "\nAccuracy: " +
                            bestAccuracy.toFixed(2) + " meters" +
                            "\n\nBest location found within 30 seconds.";
                    }
                }

            }, 30000);
        }
    </script>

</body>
</html>
